
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Recipe Menu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🍳 My Recipe Book</h1>
        <p>Delicious meals for every time of the day</p>
    </header>

    <section class="menu">

        <!-- Breakfast -->
        <div class="card">
            <img src="https://source.unsplash.com/400x300/?idly,dosa" alt="Breakfast">
            <h2>Breakfast</h2>
            <p>Idly, Dosa, Pongal, Upma</p>
        </div>

        <!-- Lunch -->
        <div class="card">
            <img src="https://source.unsplash.com/400x300/?south-indian-meals" alt="Lunch">
            <h2>Lunch</h2>
            <p>Rice, Sambar, Rasam, Veg Curry</p>
        </div>

        <!-- Dinner -->
        <div class="card">
            <img src="https://source.unsplash.com/400x300/?chapati,parotta" alt="Dinner">
            <h2>Dinner</h2>
            <p>Chapati, Parotta, Kurma, Fried Rice</p>
        </div>

        <!-- Dessert -->
        <div class="card">
            <img src="https://source.unsplash.com/400x300/?dessert,sweets" alt="Dessert">
            <h2>Dessert</h2>
            <p>Gulab Jamun, Ice Cream, Payasam</p>
        </div>

    </section>

</body>
</html>
