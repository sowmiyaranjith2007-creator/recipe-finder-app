<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Breakfast Recipes</title>
    <link rel="stylesheet" href="breakfast.css">
</head>
<body>

    <header>
        <h1>🍳 Breakfast Delight</h1>
        <p>Start your day with tasty recipes</p>
    </header>

    <div class="container">

        <!-- Idly -->
        <div class="card">
            <div class="img-box">
                <img src="https://images.unsplash.com/photo-1630383249896-424e482df921" alt="Idly">
            </div>
            <div class="content">
                <h2>Idly</h2>
                <p><b>Ingredients:</b> Rice, Urad dal, Salt</p>
                <p><b>Steps:</b> Soak → Grind → Ferment → Steam</p>
            </div>
        </div>

        <!-- Dosa -->
        <div class="card">
            <div class="img-box">
                <img src="https://images.unsplash.com/photo-1668236543090-82eba5ee5976" alt="Dosa">
            </div>
            <div class="content">
                <h2>Dosa</h2>
                <p><b>Ingredients:</b> Rice, Urad dal, Oil</p>
                <p><b>Steps:</b> Ferment → Spread → Cook</p>
            </div>
        </div>

        <!-- Pongal -->
        <div class="card">
            <div class="img-box">
                <img src="https://images.unsplash.com/photo-1604908176997-125f25cc6f3d" alt="Pongal">
            </div>
            <div class="content">
                <h2>Pongal</h2>
                <p><b>Ingredients:</b> Rice, Dal, Pepper, Ghee</p>
                <p><b>Steps:</b> Cook → Temper → Mix</p>
            </div>
        </div>

    </div>

</body>
</html>
